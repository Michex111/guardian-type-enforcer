name: Build and Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Use latest runners to ensure support for newest Python releases
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # 1. Setup a fresh isolated environment using uv
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: "cp314-* cp314t-*"
          CIBW_PRERELEASE_PYTHONS: "True"
          CIBW_ARCHS_MACOS: x86_64 arm64
          # PEP 668 fix: cibuildwheel manages its own isolated envs, 
          # but we ensure no system-wide installs leak in.
          CIBW_BEFORE_BUILD: "pip install uv"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  publish_pypi:
    needs: [build_wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}